name: Deploy Docs

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: yarn install
      - run: yarn lib:build
      - run: yarn workspace @micromodal/docs sync
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/src
      - id: deployment
        uses: actions/deploy-pages@v4
